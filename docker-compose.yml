services:
  # --- BACKEND SERVICES ---
  api:
    image: ghcr.io/kamilgaraev/proexpert/prohelper:latest
    container_name: prohelper-api
    restart: unless-stopped
    command: "php artisan octane:start --server=roadrunner --host=0.0.0.0 --port=8000"
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
      - ./storage/framework/cache:/var/www/html/storage/framework/cache
      - ./storage/framework/sessions:/var/www/html/storage/framework/sessions
    networks:
      - prohelper-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  websockets:
    image: ghcr.io/kamilgaraev/proexpert/prohelper:latest
    container_name: prohelper-websockets
    restart: unless-stopped
    command: "php artisan reverb:start --host=0.0.0.0 --port=8080"
    ports:
      - "8080:8080"
    env_file: .env
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
    networks:
      - prohelper-network

  horizon:
    image: ghcr.io/kamilgaraev/proexpert/prohelper:latest
    container_name: prohelper-horizon
    restart: unless-stopped
    command: "php artisan horizon"
    env_file: .env
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
      - ./storage/framework/cache:/var/www/html/storage/framework/cache
    networks:
      - prohelper-network

  worker-heavy:
    image: ghcr.io/kamilgaraev/proexpert/prohelper:latest
    container_name: prohelper-worker-heavy
    restart: unless-stopped
    command: "php artisan queue:work redis --queue=heavy-imports --memory=2048 --timeout=3600"
    env_file: .env
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
      - ./storage/framework/cache:/var/www/html/storage/framework/cache
    networks:
      - prohelper-network
    deploy:
      resources:
        limits:
          memory: 2.5G

  scheduler:
    image: ghcr.io/kamilgaraev/proexpert/prohelper:latest
    container_name: prohelper-scheduler
    restart: unless-stopped
    command: "php artisan schedule:work"
    env_file: .env
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
      - ./storage/framework/cache:/var/www/html/storage/framework/cache
    networks:
      - prohelper-network

  # --- MONITORING SERVICES ---
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki:/etc/loki
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - prohelper-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - ./storage/logs:/var/log/laravel:ro
      - ./monitoring/promtail:/etc/promtail
      - /var/log:/var/log/host:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - prohelper-network
    depends_on:
      loki:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: unless-stopped
    networks:
      - prohelper-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - prohelper-network
    depends_on:
      prometheus:
        condition: service_healthy

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
    restart: unless-stopped
    networks:
      - prohelper-network

  # Автоматический перезапуск упавших контейнеров
  watchdog:
    image: willfarrell/autoheal
    container_name: monitoring-watchdog
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=5
      - AUTOHEAL_START_PERIOD=0
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=10
    restart: unless-stopped
    networks:
      - prohelper-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=${POSTGRES_EXPORTER_DSN}
    networks:
      - prohelper-network
    restart: unless-stopped

networks:
  prohelper-network:
    driver: bridge

volumes:
  grafana-data:
  prometheus-data:
  loki-data: