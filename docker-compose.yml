x-json-logging: &json-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-reverb-client-environment: &reverb-client-environment
  REVERB_INTERNAL_HOST: websockets
  REVERB_INTERNAL_PORT: 8080
  REVERB_INTERNAL_SCHEME: http

services:
  # --- BACKEND SERVICES ---
  api:
    image: ${MOST_IMAGE_REF:-ghcr.io/kamilgaraev/proexpert/prohelper:${MOST_IMAGE_TAG:-latest}}
    container_name: prohelper-api
    restart: unless-stopped
    command: "php -d memory_limit=1G artisan octane:start --server=roadrunner --host=0.0.0.0 --port=8000 --workers=4 --max-requests=1000 --rr-config=/var/www/html/.rr.yaml"
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    environment: *reverb-client-environment
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
    networks:
      - prohelper-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/up || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
    logging: *json-logging

  websockets:
    image: ${MOST_IMAGE_REF:-ghcr.io/kamilgaraev/proexpert/prohelper:${MOST_IMAGE_TAG:-latest}}
    container_name: prohelper-websockets
    restart: unless-stopped
    command: "php artisan reverb:start --host=0.0.0.0 --port=8080"
    ports:
      - "127.0.0.1:8080:8080"
    env_file: .env
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
    networks:
      - prohelper-network
    healthcheck:
      test: ["CMD-SHELL", "php -r 'exit(@fsockopen(\"127.0.0.1\", 8080) ? 0 : 1);'"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *json-logging

  horizon:
    image: ${MOST_IMAGE_REF:-ghcr.io/kamilgaraev/proexpert/prohelper:${MOST_IMAGE_TAG:-latest}}
    container_name: prohelper-horizon
    restart: unless-stopped
    command: "php artisan horizon"
    env_file: .env
    environment: *reverb-client-environment
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
    networks:
      - prohelper-network
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q 'Horizon is running' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *json-logging

  worker-heavy:
    image: ${MOST_IMAGE_REF:-ghcr.io/kamilgaraev/proexpert/prohelper:${MOST_IMAGE_TAG:-latest}}
    container_name: prohelper-worker-heavy
    restart: unless-stopped
    command: "php artisan queue:work redis --queue=heavy-imports --memory=2048 --timeout=3600"
    env_file: .env
    environment: *reverb-client-environment
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
    networks:
      - prohelper-network
    logging: *json-logging
    deploy:
      resources:
        limits:
          memory: 2.5G

  worker-ifc:
    image: ${MOST_IMAGE_REF:-ghcr.io/kamilgaraev/proexpert/prohelper:${MOST_IMAGE_TAG:-latest}}
    container_name: prohelper-worker-ifc
    restart: unless-stopped
    command: "php -d memory_limit=3072M artisan queue:work redis --queue=ifc-processing --memory=3072 --timeout=7200 --tries=1"
    env_file: .env
    environment: *reverb-client-environment
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
    networks:
      - prohelper-network
    logging: *json-logging
    deploy:
      resources:
        limits:
          memory: 3.5G

  scheduler:
    image: ${MOST_IMAGE_REF:-ghcr.io/kamilgaraev/proexpert/prohelper:${MOST_IMAGE_TAG:-latest}}
    container_name: prohelper-scheduler
    restart: unless-stopped
    command: "php artisan schedule:work"
    env_file: .env
    environment: *reverb-client-environment
    volumes:
      - ./storage/logs:/var/www/html/storage/logs
    networks:
      - prohelper-network
    logging: *json-logging

  # --- MONITORING SERVICES ---
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./monitoring/loki:/etc/loki
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    networks:
      - prohelper-network
    logging: *json-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  promtail:
    image: grafana/promtail:2.9.0
    container_name: promtail
    volumes:
      - ./storage/logs:/var/log/laravel:ro
      - ./monitoring/promtail:/etc/promtail
      - /var/log:/var/log/host:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    networks:
      - prohelper-network
    logging: *json-logging
    depends_on:
      loki:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=5d'
      - '--storage.tsdb.retention.size=8GB'
      - '--storage.tsdb.wal-compression'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: unless-stopped
    networks:
      - prohelper-network
    logging: *json-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager:ro
      - alertmanager-data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    restart: unless-stopped
    networks:
      - prohelper-network
    logging: *json-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    restart: unless-stopped
    networks:
      - prohelper-network
    logging: *json-logging

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - prohelper-network
    logging: *json-logging
    depends_on:
      prometheus:
        condition: service_healthy

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: node-exporter
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
    restart: unless-stopped
    networks:
      - prohelper-network
    logging: *json-logging

  # Автоматический перезапуск упавших контейнеров
  watchdog:
    image: willfarrell/autoheal
    container_name: monitoring-watchdog
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
      - AUTOHEAL_INTERVAL=5
      - AUTOHEAL_START_PERIOD=0
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=10
    restart: unless-stopped
    networks:
      - prohelper-network
    logging: *json-logging

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres-exporter
    ports:
      - "127.0.0.1:9187:9187"
    environment:
      - DATA_SOURCE_NAME=${POSTGRES_EXPORTER_DSN}
    networks:
      - prohelper-network
    restart: unless-stopped
    logging: *json-logging

  docker-cleanup:
    image: docker:27.5-cli
    container_name: docker-cleanup
    restart: unless-stopped
    network_mode: none
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOCKER_IMAGE_PRUNE_UNTIL: 48h
      DOCKER_BUILDER_PRUNE_UNTIL: 48h
      DOCKER_CLEANUP_INTERVAL_SECONDS: 86400
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          date
          docker image prune -a -f --filter "until=$${DOCKER_IMAGE_PRUNE_UNTIL}"
          docker builder prune -a -f --filter "until=$${DOCKER_BUILDER_PRUNE_UNTIL}"
          docker system df
          sleep "$${DOCKER_CLEANUP_INTERVAL_SECONDS}"
        done
    logging: *json-logging

networks:
  prohelper-network:
    driver: bridge

volumes:
  grafana-data:
  prometheus-data:
  alertmanager-data:
  loki-data:
