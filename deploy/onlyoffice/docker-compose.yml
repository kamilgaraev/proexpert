services:
  onlyoffice:
    image: ${ONLYOFFICE_IMAGE:?Set ONLYOFFICE_IMAGE in .env}
    container_name: most-onlyoffice
    restart: unless-stopped
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:?Set ONLYOFFICE_JWT_SECRET in .env}
    ports:
      - "127.0.0.1:8088:80"
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data
      - onlyoffice-logs:/var/log/onlyoffice
      - onlyoffice-lib:/var/lib/onlyoffice
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/healthcheck | grep -qx true"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "5"

volumes:
  onlyoffice-data:
  onlyoffice-logs:
  onlyoffice-lib:
