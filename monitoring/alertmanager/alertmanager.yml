global:
  resolve_timeout: 5m

route:
  receiver: ops-default
  group_by:
    - alertname
    - service
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - receiver: ops-critical
      matchers:
        - severity = "critical"
      repeat_interval: 30m

receivers:
  - name: ops-default
  - name: ops-critical

inhibit_rules:
  - source_matchers:
      - severity = "critical"
    target_matchers:
      - severity = "warning"
    equal:
      - alertname
      - service
