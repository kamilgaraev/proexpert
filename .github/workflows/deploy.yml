name: Deploy to Production

concurrency:
  group: prod-deploy
  cancel-in-progress: false

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ghcr.io/${{ github.repository }}/prohelper:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.169.44.117
          username: root
          key: ${{ secrets.DEPLOY }}
          timeout: 15m
          command_timeout: 15m
          script: |
            set -e
            cd /var/www/prohelper
            RELEASE_HASH="${{ github.sha }}"
            SHORT_RELEASE="${RELEASE_HASH:0:7}"

            git fetch --all --prune
            git reset --hard origin/main

            echo "Updating Sentry release to prohelper@${SHORT_RELEASE}"
            if grep -q '^SENTRY_RELEASE=' .env; then
              sed -i "s/^SENTRY_RELEASE=.*/SENTRY_RELEASE=prohelper@${SHORT_RELEASE}/" .env
            else
              printf '\nSENTRY_RELEASE=prohelper@%s\n' "${SHORT_RELEASE}" >> .env
            fi

            if grep -q '^SENTRY_ENVIRONMENT=' .env; then
              sed -i "s/^SENTRY_ENVIRONMENT=.*/SENTRY_ENVIRONMENT=production/" .env
            else
              printf 'SENTRY_ENVIRONMENT=production\n' >> .env
            fi

            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Updating all services (Backend + Monitoring)..."
            docker compose pull

            docker stop monitoring-watchdog promtail || true
            docker rm -f monitoring-watchdog promtail || true

            docker compose up -d --remove-orphans --force-recreate

            echo "Waiting for services to stabilize..."
            sleep 10

            echo "Optimizing Laravel cache..."
            docker compose exec -T api php artisan optimize:clear
            docker compose exec -T api php artisan optimize

            echo "Running migrations..."
            docker compose exec -T api php artisan migrate:safe --force

            echo "Reloading Octane workers..."
            docker compose exec -T api php artisan octane:reload

            echo "Deployment successful!"
