name: Deploy to Production

concurrency:
  group: prod-deploy
  cancel-in-progress: false

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY}}



      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install NPM deps
        run: |
          npm ci --silent

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/prohelper

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ghcr.io/${{ github.repository }}/prohelper:latest
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy via SSH (appleboy)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.169.44.117
          username: root
          key: ${{ secrets.DEPLOY }}
          timeout: 300s
          command_timeout: 180s
          script: |
            set -e # Остановить выполнение при первой ошибке
            cd /var/www/prohelper
            
            # Настройка Git safe.directory (оставляем для копирования docker-compose)
            git config --global --add safe.directory /var/www/prohelper
            git config --global --add safe.directory '*'
            
            # Обновляем ТОЛЬКО docker-compose и конфигурации, сам код теперь в образе
            git fetch --all --prune
            git reset --hard origin/main
            
            # Логинимся в GHCR на сервере
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Сначала останавливаем старые не-докер процессы (supervisor, systemd), чтобы освободить порты 8000 и 8080
            echo "🔄 Stopping old native services (if any)..."
            sudo systemctl stop prohelper-octane || true
            sudo systemctl stop supervisor || true
            killall -9 roadrunner-worker || true
            echo "✅ Old services stopped" 
            
            # Скачиваем свежий образ
            echo "🔄 Pulling new Docker image..."
            if command -v docker-compose >/dev/null; then
              docker-compose -f docker-compose.prod.yml pull
            else
              docker compose -f docker-compose.prod.yml pull
            fi
            
            # ПЕРЕЗАПУСК МОНИТОРИНГА: Поднимаем его заново, так как --remove-orphans его случайно убил
            echo "🔄 Starting monitoring services..."
            if command -v docker-compose >/dev/null; then
              docker-compose up -d prometheus grafana loki promtail node-exporter postgres-exporter monitoring-watchdog || true
            else
              docker compose up -d prometheus grafana loki promtail node-exporter postgres-exporter monitoring-watchdog || true
            fi
            
            # Перезапускаем контейнеры PROHELPER
            echo "🔄 Starting/Updating containers..."
            if command -v docker-compose >/dev/null; then
              docker-compose -f docker-compose.prod.yml up -d
            else
              docker compose -f docker-compose.prod.yml up -d
            fi
            
            # Выполняем миграции ВНУТРИ контейнера API
            echo "🔄 Running safe migrations..."
            if command -v docker-compose >/dev/null; then
              docker-compose -f docker-compose.prod.yml exec -T api php artisan migrate:safe --force
            else
              docker compose -f docker-compose.prod.yml exec -T api php artisan migrate:safe --force
            fi
            echo "✅ Migrations completed successfully"
            
            # Оптимизация (кеширование роутов, конфигов) ВНУТРИ контейнера API
            echo "🔄 Optimizing application..."
            if command -v docker-compose >/dev/null; then
              docker-compose -f docker-compose.prod.yml exec -T api php artisan optimize:clear
              docker-compose -f docker-compose.prod.yml exec -T api php artisan optimize
            else
              docker compose -f docker-compose.prod.yml exec -T api php artisan optimize:clear
              docker compose -f docker-compose.prod.yml exec -T api php artisan optimize
            fi
            echo "✅ Optimization completed successfully"


      - name: Setup Monitoring (appleboy)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.169.44.117
          username: root
          key: ${{ secrets.DEPLOY }}
          timeout: 120s
          command_timeout: 90s
          script: |
            cd /var/www/prohelper
            mkdir -p storage/logs/{api,telemetry}
            chmod -R 777 storage/logs/
            if ! docker ps | grep -q prometheus; then
              echo 'Starting monitoring stack...'
              chmod +x start-monitoring.sh
              ./start-monitoring.sh
            else
              echo 'Monitoring stack already running, restarting services...'
              (command -v docker-compose >/dev/null && docker-compose restart prometheus grafana || docker compose restart prometheus grafana)
            fi

      - name: Update Monitoring Configuration and Notify (appleboy)
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.169.44.117
          username: root
          key: ${{ secrets.DEPLOY }}
          timeout: 120s
          command_timeout: 90s
          script: |
            cd /var/www/prohelper
            chmod +x start-monitoring.sh stop-monitoring.sh
            mkdir -p /var/lock
            flock -n /var/lock/prohelper-monitoring.lock -c '
              (docker ps -aq --filter name=^promtail$ | xargs -r docker stop) || true &&
              docker rm -f promtail 2>/dev/null || true &&
              if command -v docker-compose >/dev/null; then
                docker-compose up -d --remove-orphans --force-recreate prometheus grafana loki promtail node-exporter;
              else
                docker compose up -d --remove-orphans --force-recreate prometheus grafana loki promtail node-exporter;
              fi' || true
            sleep 3
            curl -X POST http://localhost:9090/api/v1/admin/tsdb/snapshot || true
            echo '{"timestamp":"'$(date -Iseconds)'","event":"deployment","version":"${{ github.sha }}","branch":"${{ github.ref_name }}"}' >> storage/logs/api/deployment.log