name: Deploy to Production

concurrency:
  group: prod-deploy
  cancel-in-progress: false

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: ghcr.io/${{ github.repository }}/prohelper:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.169.44.117
          username: root
          key: ${{ secrets.DEPLOY }}
          timeout: 15m
          command_timeout: 15m
          script: |
            set -e
            cd /var/www/prohelper
            
            # Обновляем конфиги (docker-compose.yml и .rr.yaml)
            git fetch --all --prune
            git reset --hard origin/main
            
            # Логинимся
            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Обновляем ВСЁ (бэк + мониторинг)
            echo "🔄 Updating all services (Backend + Monitoring)..."
            docker compose pull
            
            # Принудительно гасим конфликтующие контейнеры перед обновлением
            docker stop monitoring-watchdog promtail || true
            docker rm -f monitoring-watchdog promtail || true
            
            # Поднимаем единый стек. Само удалит orphans!
            docker compose up -d --remove-orphans --force-recreate
            
            # Миграции и оптимизация
            echo "🔄 Running artisan commands..."
            docker compose exec -T api php artisan migrate:safe --force
            docker compose exec -T api php artisan optimize:clear
            docker compose exec -T api php artisan optimize
            
            echo "✅ Deployment successful!"