name: Deploy Backend to Production

permissions:
  contents: read
  packages: write

concurrency:
  group: prod-backend-deploy
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'artisan'
      - 'bootstrap/**'
      - 'composer.json'
      - 'composer.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'config/**'
      - 'database/**'
      - 'Dockerfile.prod'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'docker/**'
      - 'lang/**'
      - 'monitoring/**'
      - 'public/**'
      - 'resources/**'
      - 'routes/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact release
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Derive image metadata
        id: meta
        run: |
          echo "release_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_repo=ghcr.io/${GITHUB_REPOSITORY}/prohelper" >> "$GITHUB_OUTPUT"

      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          build-args: |
            MOST_RELEASE_SHA=${{ github.sha }}
          tags: |
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.release_sha }}
          cache-from: |
            type=gha,scope=most-backend-prod
            type=gha
          cache-to: type=gha,scope=most-backend-prod,mode=max

      - name: Deploy exact image digest
        uses: appleboy/ssh-action@v1.0.3
        env:
          YOOKASSA_SHOP_ID: ${{ secrets.YOOKASSA_SHOP_ID }}
          YOOKASSA_SECRET_KEY: ${{ secrets.YOOKASSA_SECRET_KEY }}
          YOOKASSA_TEST_ORGANIZATION_IDS: ${{ secrets.YOOKASSA_TEST_ORGANIZATION_IDS }}
        with:
          host: 89.169.44.117
          username: root
          key: ${{ secrets.DEPLOY }}
          timeout: 15m
          command_timeout: 15m
          envs: YOOKASSA_SHOP_ID,YOOKASSA_SECRET_KEY,YOOKASSA_TEST_ORGANIZATION_IDS
          script: |
            set -euo pipefail
            RELEASE_SHA="${{ steps.meta.outputs.release_sha }}"
            IMAGE_REPO="${{ steps.meta.outputs.image_repo }}"
            IMAGE_DIGEST="${{ steps.build.outputs.digest }}"
            IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
            BACKEND_SERVICES="api websockets horizon geometry-worker geometry-recovery-worker worker-heavy worker-ifc scheduler"
            REVERB_APP_KEY="${{ secrets.REVERB_APP_KEY }}"

            [[ "${RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]]
            [[ "${IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]
            [[ "${REVERB_APP_KEY}" =~ ^[0-9a-f]{64}$ ]]

            cd /var/www/prohelper
            git fetch origin "${RELEASE_SHA}"
            git reset --hard "${RELEASE_SHA}"
            test "$(git rev-parse HEAD)" = "${RELEASE_SHA}"

            upsert_env() {
              local key="$1"
              local value="$2"
              local temporary_file
              temporary_file="$(mktemp)"
              awk -v key="${key}" 'index($0, key "=") != 1 { print }' .env > "${temporary_file}"
              printf '%s=%s\n' "${key}" "${value}" >> "${temporary_file}"
              cat "${temporary_file}" > .env
              rm -f "${temporary_file}"
            }

            if [ -n "${YOOKASSA_SHOP_ID:-}" ] && [ -n "${YOOKASSA_SECRET_KEY:-}" ]; then
              upsert_env YOOKASSA_MODE yookassa_test
              upsert_env YOOKASSA_SHOP_ID "${YOOKASSA_SHOP_ID}"
              upsert_env YOOKASSA_SECRET_KEY "${YOOKASSA_SECRET_KEY}"
              upsert_env YOOKASSA_TEST_ORGANIZATION_IDS "${YOOKASSA_TEST_ORGANIZATION_IDS:-}"
              upsert_env YOOKASSA_RETURN_URL 'https://1мост.рф/dashboard/billing'
              upsert_env YOOKASSA_WEBHOOK_URL 'https://1мост.рф/api/v1/webhooks/yookassa'
              upsert_env YOOKASSA_RECEIPT_ENABLED false
              upsert_env YOOKASSA_LIVE_ENABLED false
              upsert_env YOOKASSA_LIVE_LEGAL_ENTITY_CONFIRMED false
              upsert_env YOOKASSA_LIVE_CONTRACT_CONFIRMED false
              upsert_env YOOKASSA_LIVE_RECEIPT_SETTINGS_CONFIRMED false
            else
              upsert_env YOOKASSA_MODE disabled
            fi

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull "${IMAGE_REF}"

            if grep -q '^MOST_IMAGE_REF=' .env; then
              sed -i "s|^MOST_IMAGE_REF=.*|MOST_IMAGE_REF=${IMAGE_REF}|" .env
            else
              printf '\nMOST_IMAGE_REF=%s\n' "${IMAGE_REF}" >> .env
            fi
            if grep -q '^MOST_RELEASE_SHA=' .env; then
              sed -i "s/^MOST_RELEASE_SHA=.*/MOST_RELEASE_SHA=${RELEASE_SHA}/" .env
            else
              printf 'MOST_RELEASE_SHA=%s\n' "${RELEASE_SHA}" >> .env
            fi
            if grep -q '^SENTRY_RELEASE=' .env; then
              sed -i "s/^SENTRY_RELEASE=.*/SENTRY_RELEASE=prohelper@${RELEASE_SHA}/" .env
            else
              printf 'SENTRY_RELEASE=prohelper@%s\n' "${RELEASE_SHA}" >> .env
            fi
            if grep -q '^REVERB_APP_KEY=' .env; then
              sed -i "s|^REVERB_APP_KEY=.*|REVERB_APP_KEY=${REVERB_APP_KEY}|" .env
            else
              printf 'REVERB_APP_KEY=%s\n' "${REVERB_APP_KEY}" >> .env
            fi

            SUPERVISOR_STATUS="$(supervisorctl status 2>/dev/null || true)"
            if grep -Eq '^laravel-worker(_[0-9]+|:)' <<< "${SUPERVISOR_STATUS}"; then
              supervisorctl stop 'laravel-worker:*'
            fi

            if pgrep -af '^php /var/www/prohelper/artisan queue:work( |$)' >/dev/null; then
              echo 'Legacy Laravel queue workers are still running; refusing dual queue ownership'
              exit 1
            fi

            MOST_IMAGE_REF="${IMAGE_REF}" docker compose run --rm --no-deps geometry-worker /usr/local/bin/geometry-runtime-smoke
            MOST_IMAGE_REF="${IMAGE_REF}" docker compose run --rm --no-deps api php artisan migrate:safe --force
            MOST_IMAGE_REF="${IMAGE_REF}" docker compose up -d --force-recreate --remove-orphans ${BACKEND_SERVICES}

            for attempt in $(seq 1 24); do
              if docker compose exec -T api curl -fsS http://localhost:8000/up >/dev/null \
                && docker compose exec -T websockets php -r 'exit(@fsockopen("127.0.0.1", 8080) ? 0 : 1);' \
                && docker compose exec -T geometry-worker /usr/local/bin/geometry-runtime-smoke; then
                echo "Backend deployment successful: ${IMAGE_REF}"
                exit 0
              fi
              sleep 5
            done

            docker compose logs --tail=200 api
            docker compose logs --tail=200 websockets
            docker compose logs --tail=200 horizon
            docker compose logs --tail=200 geometry-worker
            exit 1
