name: Deploy Backend to Production

concurrency:
  group: prod-backend-deploy
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'artisan'
      - 'bootstrap/**'
      - 'composer.json'
      - 'composer.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'config/**'
      - 'database/**'
      - 'Dockerfile.prod'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'lang/**'
      - 'monitoring/**'
      - 'public/**'
      - 'resources/**'
      - 'routes/**'
      - 'scripts/**'
      - 'vendor/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Derive image metadata
        id: meta
        run: |
          echo "release_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_repo=ghcr.io/${GITHUB_REPOSITORY}/prohelper" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          build-args: |
            MOST_RELEASE_SHA=${{ github.sha }}
          tags: |
            ${{ steps.meta.outputs.image_repo }}:latest
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.release_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.169.44.117
          username: root
          key: ${{ secrets.DEPLOY }}
          timeout: 15m
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /var/www/prohelper
            RELEASE_SHA="${{ steps.meta.outputs.release_sha }}"
            BACKEND_SERVICES="api websockets horizon worker-heavy worker-ifc scheduler"
            MONITORING_SERVICES="loki promtail prometheus grafana node-exporter watchdog postgres-exporter docker-cleanup"

            git fetch --all --prune
            git reset --hard origin/main

            if grep -q '^SENTRY_ENVIRONMENT=' .env; then
              sed -i "s/^SENTRY_ENVIRONMENT=.*/SENTRY_ENVIRONMENT=production/" .env
            else
              printf 'SENTRY_ENVIRONMENT=production\n' >> .env
            fi

            echo ${{ secrets.GHCR_PAT }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "Pulling immutable backend release ${RELEASE_SHA}"
            MOST_IMAGE_TAG=${RELEASE_SHA} docker compose pull ${BACKEND_SERVICES}
            docker compose pull ${MONITORING_SERVICES}

            IMAGE_REF="ghcr.io/${{ github.repository }}/prohelper:${RELEASE_SHA}"
            LARAVEL_UID="$(docker run --rm --entrypoint sh "${IMAGE_REF}" -c 'id -u www-data')"
            LARAVEL_GID="$(docker run --rm --entrypoint sh "${IMAGE_REF}" -c 'id -g www-data')"

            install -d -m 775 bootstrap/cache
            install -d -m 775 \
              storage/logs \
              storage/logs/access \
              storage/logs/technical \
              storage/logs/business \
              storage/logs/security \
              storage/logs/api \
              storage/logs/telemetry \
              storage/logs/audit
            touch storage/logs/laravel.log
            chown -R "${LARAVEL_UID}:${LARAVEL_GID}" storage bootstrap/cache
            chmod -R ug+rwX storage bootstrap/cache
            chmod 664 storage/logs/laravel.log

            echo "Expanding schema with the new image while the old runtime stays active..."
            MOST_IMAGE_TAG=${RELEASE_SHA} docker compose run --rm --no-deps api php artisan migrate --force

            install -d -o root -g root -m 0755 /usr/local/libexec/most /etc/most /var/lib/most-active-release
            install -o root -g root -m 0555 scripts/coordinate-most-release.sh /usr/local/libexec/most/coordinate-most-release
            test -f /etc/most/release-coordinator.conf
            /usr/local/libexec/most/coordinate-most-release backend "${RELEASE_SHA}"
            docker compose up -d --force-recreate ${MONITORING_SERVICES}

            echo "Pruning unused Docker images older than 48 hours..."
            docker image prune -a -f --filter "until=48h"
            docker builder prune -a -f --filter "until=48h"
            docker system df
            df -h /

            echo "Backend deployment successful: ${RELEASE_SHA}"
