name: Deploy Backend to Production

permissions:
  contents: read
  packages: write

concurrency:
  group: prod-backend-deploy
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'artisan'
      - 'bootstrap/**'
      - 'composer.json'
      - 'composer.lock'
      - 'package.json'
      - 'package-lock.json'
      - 'config/**'
      - 'database/**'
      - 'Dockerfile.prod'
      - '.dockerignore'
      - 'docker-compose.yml'
      - 'lang/**'
      - 'monitoring/**'
      - 'public/**'
      - 'resources/**'
      - 'routes/**'
      - 'scripts/**'
      - 'tests/Architecture/ai-estimator-production-deploy.sh'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact release
        uses: actions/checkout@v4

      - name: Verify production release contract
        run: bash tests/Architecture/ai-estimator-production-deploy.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Derive image metadata
        id: meta
        run: |
          echo "release_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_repo=ghcr.io/${GITHUB_REPOSITORY}/prohelper" >> "$GITHUB_OUTPUT"

      - name: Build and push immutable image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          build-args: |
            MOST_RELEASE_SHA=${{ github.sha }}
          tags: |
            ${{ steps.meta.outputs.image_repo }}:${{ steps.meta.outputs.release_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy exact image digest
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 89.169.44.117
          username: ${{ secrets.BACKEND_DEPLOY_USER }}
          key: ${{ secrets.DEPLOY }}
          timeout: 15m
          command_timeout: 15m
          script: |
            set -euo pipefail
            RELEASE_SHA="${{ steps.meta.outputs.release_sha }}"
            IMAGE_REPO="${{ steps.meta.outputs.image_repo }}"
            IMAGE_DIGEST="${{ steps.build.outputs.digest }}"
            IMAGE_REF="${IMAGE_REPO}@${IMAGE_DIGEST}"
            [[ "${RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]]
            [[ "${IMAGE_DIGEST}" =~ ^sha256:[0-9a-f]{64}$ ]]

            cd /var/www/prohelper
            git fetch origin "${RELEASE_SHA}"
            git checkout --detach "${RELEASE_SHA}"
            test "$(git rev-parse HEAD)" = "${RELEASE_SHA}"

            sudo /usr/local/libexec/most/coordinate-most-release backend "${RELEASE_SHA}" "${IMAGE_REPO}" "${IMAGE_DIGEST}"

            echo "Backend deployment successful: ${IMAGE_REF}"
