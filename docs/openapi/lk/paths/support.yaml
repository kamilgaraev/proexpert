/support:
  post:
    tags: [Support]
    summary: Отправить запрос в техподдержку
    description: |
      Отправляет обращение в службу технической поддержки МОСТ.
      
      **📧 Процесс обработки:**
      - Запрос отправляется на email поддержки
      - Письмо содержит информацию об отправителе и его организации
      - Служба поддержки ответит на email пользователя в рабочее время
      
      **⏰ Время обработки:**
      - Критичные вопросы: до 4 часов
      - Обычные вопросы: 1-2 рабочих дня
      - Консультации: 2-3 рабочих дня
      
      Для ускорения обработки укажите максимально подробное описание проблемы.
    security:
      - bearerAuth: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/SupportRequest.yaml'
          examples:
            simple_question:
              summary: Простой вопрос
              value:
                subject: "Как добавить нового пользователя?"
                message: "Подскажите, пожалуйста, как добавить нового сотрудника в систему и назначить ему роль прораба?"
            technical_issue:
              summary: Техническая проблема
              value:
                subject: "Ошибка при загрузке файлов"
                message: "При попытке загрузить фото объекта появляется ошибка 'Превышен размер файла', хотя файл весит всего 2 МБ. Браузер Chrome 119, операционная система Windows 11."
            billing_question:
              summary: Вопрос по биллингу
              value:
                subject: "Вопрос по тарифному плану"
                message: "Хотел бы узнать подробности о возможности перехода на тариф 'Профессиональный'. Сколько это будет стоить и что входит в стоимость?"
    responses:
      "200":
        description: Запрос в поддержку отправлен успешно
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: "Запрос в поддержку отправлен успешно. Мы ответим вам в ближайшее время."
                data:
                  type: object
                  nullable: true
                  example: null
      "400":
        description: Ошибка валидации данных
        content:
          application/json:
            schema:
              $ref: '../components/schemas/ApiResponse.yaml'
            examples:
              validation_error:
                summary: Ошибка валидации
                value:
                  success: false
                  message: "Validation failed"
                  errors:
                    subject: ["Поле 'Тема' обязательно для заполнения"]
                    message: ["Поле 'Сообщение' обязательно для заполнения"]
      "401":
        description: Пользователь не авторизован
        content:
          application/json:
            schema:
              $ref: '../components/schemas/ApiResponse.yaml'
      "500":
        description: Внутренняя ошибка сервера при отправке запроса
        content:
          application/json:
            schema:
              $ref: '../components/schemas/ApiResponse.yaml'
            examples:
              server_error:
                summary: Ошибка сервера
                value:
                  success: false
                  message: "Произошла внутренняя ошибка при отправке запроса. Попробуйте позже или свяжитесь с администратором." 