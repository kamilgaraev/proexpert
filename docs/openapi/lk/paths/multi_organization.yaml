    security:
      - bearerAuth: []
    parameters:
      - name: childOrgId
        in: path
        required: true
        schema: { type: integer }
    responses:
      "200":
        description: Организация обновлена
  delete:
    tags: [MultiOrganization, ChildOrganizations]
    summary: Безопасно удалить или архивировать дочернюю организацию
    security:
      - bearerAuth: []
    parameters:
      - name: childOrgId
        in: path
        required: true
        schema: { type: integer }
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [confirm_deletion]
            properties:
              confirm_deletion: { type: boolean }
              transfer_data_to:
                type: integer
                description: ID головной или дочерней организации того же холдинга
    responses:
      "200":
        description: Организация удалена или архивирована
      "403":
        description: Нет доступа
      "422":
        description: Некорректная организация для переноса данных

