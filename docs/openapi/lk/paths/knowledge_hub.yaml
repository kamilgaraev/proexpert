/knowledge-hub/overview:
  get:
    tags: [KnowledgeHub]
    summary: Получить обзор базы знаний
    security:
      - bearerAuth: []
    responses:
      "200":
        description: Обзор базы знаний загружен
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: База знаний загружена.
                data:
                  type: object
                  properties:
                    categories:
                      type: array
                      items:
                        $ref: "#/components/schemas/KnowledgeCategory"
                    featured_articles:
                      type: array
                      items:
                        $ref: "#/components/schemas/KnowledgeArticleSummary"
                    latest_changelog:
                      type: array
                      items:
                        $ref: "#/components/schemas/KnowledgeArticleSummary"
                    summary:
                      $ref: "#/components/schemas/KnowledgeHubSummary"

/knowledge-hub/articles:
  get:
    tags: [KnowledgeHub]
    summary: Получить список материалов базы знаний
    security:
      - bearerAuth: []
    parameters:
      - name: q
        in: query
        required: false
        schema:
          type: string
      - name: category
        in: query
        required: false
        schema:
          type: string
      - name: kind
        in: query
        required: false
        schema:
          type: string
          enum: [article, guide, best_practice, tip]
      - name: tag
        in: query
        required: false
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 30
    responses:
      "200":
        description: Материалы загружены
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeArticleCollectionResponse"

/knowledge-hub/articles/{slug}:
  get:
    tags: [KnowledgeHub]
    summary: Получить материал базы знаний
    security:
      - bearerAuth: []
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Материал загружен
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeArticleDetailResponse"
      "404":
        description: Материал не найден

/knowledge-hub/changelog:
  get:
    tags: [KnowledgeHub]
    summary: Получить историю обновлений
    security:
      - bearerAuth: []
    parameters:
      - name: q
        in: query
        required: false
        schema:
          type: string
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 30
    responses:
      "200":
        description: История обновлений загружена
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeArticleCollectionResponse"

/knowledge-hub/changelog/{slug}:
  get:
    tags: [KnowledgeHub]
    summary: Получить запись истории обновлений
    security:
      - bearerAuth: []
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
    responses:
      "200":
        description: Запись загружена
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeArticleDetailResponse"
      "404":
        description: Запись не найдена

components:
  schemas:
    KnowledgeCategory:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: [string, "null"]
        icon:
          type: [string, "null"]
        color:
          type: [string, "null"]
        articles_count:
          type: integer
    KnowledgeArticleSummary:
      type: object
      properties:
        id:
          type: integer
        kind:
          type: string
          enum: [article, guide, best_practice, tip, changelog]
        kind_label:
          type: string
        status:
          type: string
          enum: [draft, published, archived]
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: [string, "null"]
        category:
          oneOf:
            - $ref: "#/components/schemas/KnowledgeCategory"
            - type: "null"
        tags:
          type: array
          items:
            type: string
        release_version:
          type: [string, "null"]
        release_date:
          type: [string, "null"]
          format: date
        published_at:
          type: [string, "null"]
          format: date-time
        reading_time:
          type: integer
        is_featured:
          type: boolean
    KnowledgeArticleDetail:
      allOf:
        - $ref: "#/components/schemas/KnowledgeArticleSummary"
        - type: object
          properties:
            content:
              type: [string, "null"]
            table_of_contents:
              type: array
              items:
                type: object
                properties:
                  level:
                    type: integer
                    enum: [2, 3]
                  title:
                    type: string
                  anchor:
                    type: string
            related:
              type: array
              items:
                $ref: "#/components/schemas/KnowledgeArticleSummary"
    KnowledgeHubSummary:
      type: object
      properties:
        categories_count:
          type: integer
        articles_count:
          type: integer
        changelog_count:
          type: integer
    KnowledgePaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        per_page:
          type: integer
        last_page:
          type: integer
        total:
          type: integer
    KnowledgeArticleCollectionResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeArticleSummary"
        meta:
          $ref: "#/components/schemas/KnowledgePaginationMeta"
    KnowledgeArticleDetailResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/KnowledgeArticleDetail"
